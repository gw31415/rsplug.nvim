name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  preflight:
    name: Validate release tag
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout full history
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Verify immutable tag and source version
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          [[ "$GITHUB_REF_NAME" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$ ]] || {
            echo "invalid release tag: $GITHUB_REF_NAME" >&2; exit 1;
          }
          tag_refs="$(git ls-remote origin "refs/tags/$GITHUB_REF_NAME" "refs/tags/$GITHUB_REF_NAME^{}")"
          [[ "$(wc -l <<<"$tag_refs" | tr -d ' ')" == 2 ]] || {
            echo "release tags must be annotated" >&2; exit 1;
          }
          tag_object="$(awk 'NR == 1 { print $1 }' <<<"$tag_refs")"
          peeled_commit="$(awk 'NR == 2 { print $1 }' <<<"$tag_refs")"
          [[ "$tag_object" != "$peeled_commit" && "$peeled_commit" == "$GITHUB_SHA" ]] || {
            echo "tag does not resolve to workflow commit" >&2; exit 1;
          }
          git merge-base --is-ancestor "$GITHUB_SHA" "origin/${{ github.event.repository.default_branch }}"
          scripts/check-release.sh "$version"
          scripts/release-metadata.sh "$version" > "$RUNNER_TEMP/release-metadata.json"
          git diff --exit-code
          git status --short --untracked-files=all
          test -z "$(git status --short --untracked-files=all)"

  test-and-package:
    name: Test and inspect packages
    runs-on: ubuntu-24.04
    needs: preflight
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - name: Install Neovim test dependency
        run: |
          sudo apt-get update
          sudo apt-get install -y neovim
      - run: cargo fmt --all -- --check
      - run: RUST_TEST_THREADS=1 cargo test --workspace --locked
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Package leaf crates
        run: |
          cargo package --locked -p rsplug-adaptive-semaphore
          cargo package --locked -p rsplug-dag
          cargo package --locked -p rsplug-file-specifier
          cargo package --locked -p rsplug-fts

  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: [preflight, test-and-package]
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-15
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: macos-15-intel
            target: x86_64-apple-darwin
            archive: tar.gz
          # Keep this label until a supported fixed Windows image is selected.
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.target }}
      - name: Build binary
        run: cargo build --release --locked --target ${{ matrix.target }} -p rsplug
      - name: Package and verify version (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          binary="target/${{ matrix.target }}/release/rsplug"
          test "$("$binary" --version | head -n1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?' | head -n1)" = "$version"
          mkdir -p dist
          cp "$binary" dist/rsplug
          tar czf "rsplug-${{ matrix.target }}-${version}.tar.gz" -C dist rsplug
      - name: Package and verify version (Windows)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          binary="target/${{ matrix.target }}/release/rsplug.exe"
          test "$("$binary" --version | head -n1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?' | head -n1)" = "$version"
          mkdir -p dist
          cp "$binary" dist/rsplug.exe
          7z a -tzip -mtc=off "rsplug-${{ matrix.target }}-${version}.zip" dist/rsplug.exe
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rsplug-${{ matrix.target }}
          path: rsplug-${{ matrix.target }}-*
          if-no-files-found: error
          retention-days: 7

  assemble-and-attest:
    name: Assemble checksums and attest
    runs-on: ubuntu-24.04
    needs: build
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true
      - name: Generate and verify checksums
        working-directory: artifacts
        run: |
          set -euo pipefail
          test "$(find . -maxdepth 1 -type f | wc -l)" -eq 5
          sha256sum rsplug-* > SHA256SUMS
          sha256sum -c SHA256SUMS
      - name: Attest release assets
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-checksums: artifacts/SHA256SUMS
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-assets
          path: artifacts
          retention-days: 7

  stage-draft:
    name: Stage draft GitHub Release
    runs-on: ubuntu-24.04
    needs: assemble-and-attest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-assets
          path: artifacts
      - name: Create or validate draft
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="$GITHUB_REF_NAME"
          repo="$GITHUB_REPOSITORY"
          release="$(gh release view "$tag" --json databaseId,isDraft 2>/dev/null || true)"
          if jq -e '(.databaseId | type) == "number"' >/dev/null 2>&1 <<<"$release"; then
            [[ "$(jq -r .isDraft <<<"$release")" == true ]] || {
              echo "a public release already exists for $tag" >&2; exit 1;
            }
            echo "draft already exists; finalization will recheck its assets"
          else
            gh release create "$tag" --draft --generate-notes \
              --title "$tag" artifacts/*
          fi
      - name: Upload assets to draft
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          release_id="$(gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --json databaseId --jq .databaseId)"
          release="$(gh api "repos/$GITHUB_REPOSITORY/releases/$release_id")"
          missing=()
          for file in artifacts/*; do
            name="$(basename "$file")"
            # Draft releases have an untagged browser URL that returns 404;
            # use the authenticated asset API endpoint for checksum reads.
            asset_id="$(jq -r --arg name "$name" '.assets[] | select(.name == $name) | .id' <<<"$release")"
            if [[ -z "$asset_id" || "$asset_id" == null ]]; then
              missing+=("$file")
              continue
            fi
            asset="$(jq -r --argjson id "$asset_id" '.assets[] | select(.id == $id) | .url' <<<"$release")"
            remote="$(mktemp)"
            curl -fsSL -H "Authorization: Bearer $GH_TOKEN" -H 'Accept: application/octet-stream' "$asset" -o "$remote"
            local_sha="$(sha256sum "$file" | awk '{print $1}')"
            remote_sha="$(sha256sum "$remote" | awk '{print $1}')"
            rm -f "$remote"
            if [[ "$local_sha" != "$remote_sha" ]]; then
              echo "replacing stale draft asset: $name" >&2
              missing+=("$file")
            fi
          done
          ((${#missing[@]} == 0)) || gh release upload --clobber "$GITHUB_REF_NAME" "${missing[@]}"

  publish-crates:
    name: Publish crates.io packages
    runs-on: ubuntu-24.04
    needs: stage-draft
    timeout-minutes: 45
    environment: crates-io
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - name: Authenticate to crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5
      - name: Publish dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: scripts/publish-crates.sh "${GITHUB_REF_NAME#v}"

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-24.04
    needs: [stage-draft, publish-crates]
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Publish existing draft
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          release_id="$(gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --json databaseId --jq .databaseId)"
          release="$(gh api "repos/$GITHUB_REPOSITORY/releases/$release_id")"
          [[ "$(jq -r .draft <<<"$release")" == true ]] || {
            echo "expected an unpublished draft release" >&2; exit 1;
          }
          version="${GITHUB_REF_NAME#v}"
          prerelease=false
          [[ "$version" == *-* ]] && prerelease=true
          gh api --method PATCH \
            "repos/$GITHUB_REPOSITORY/releases/$release_id" \
            -f draft=false -F prerelease="$prerelease"
