name: Release

on:
  push:
    tags:
      - "v*"

# Cancel in-progress runs for the same tag
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Build cross-platform binaries ──────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            cross: true
          # macOS
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          # Windows
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install 1.89.0 --no-self-update
          rustup default 1.89.0
          rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build binary
        run: |
          cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/rsplug dist/
          tar czf rsplug-${{ matrix.target }}.tar.gz -C dist rsplug

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/rsplug.exe dist/
          cd dist && 7z a ../rsplug-${{ matrix.target }}.zip rsplug.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rsplug-${{ matrix.target }}
          path: rsplug-${{ matrix.target }}.${{ matrix.archive }}
          retention-days: 7

  # ── Publish to crates.io (dependency order) ─────────────────────
  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install 1.89.0 --no-self-update
          rustup default 1.89.0

      - name: Set version from tag
        run: |
          # Strip leading 'v' from tag name: v0.2.0 → 0.2.0
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting version to ${VERSION}"
          bash scripts/set-version.sh "${VERSION}"

      - name: Publish (dependency order)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          for crate in adaptive_semaphore dag file_specifier walker rsplug; do
            echo "→ Publishing ${crate}…"
            cargo publish -p "${crate}" --no-verify
            sleep 5
          done

  # ── Create GitHub Release with all binary assets ───────────────
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install 1.89.0 --no-self-update
          rustup default 1.89.0

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          bash scripts/set-version.sh "${VERSION}"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: artifacts/*
